apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nginx
  template:
    metadata:
      labels:
        app: nginx
    spec:
      containers:
      - name: nginx
        image: {{ .Values.nginx.image }}
        ports:
        - containerPort: 80
        volumeMounts:
        - name: nginx-config
          mountPath: /etc/nginx/conf.d
        - name: static-storage
          mountPath: /app/staticfiles
      volumes:
      - name: nginx-config
        configMap:
          name: nginx-config
      - name: static-storage
        persistentVolumeClaim:
          claimName: static-pvc