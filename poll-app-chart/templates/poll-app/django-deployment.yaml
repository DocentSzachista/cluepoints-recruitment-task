apiVersion: apps/v1
kind: Deployment
metadata:
  name: django-web
spec:
  replicas: 1
  selector:
    matchLabels:
      app: django-web
  template:
    metadata:
      labels:
        app: django-web
    spec:
      initContainers:
      - name: migrate-db
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
        command:
          - sh
          - -c
          - python manage.py migrate
        envFrom:
        - secretRef:
            name: django-secret
        - configMapRef:
            name: django-config
      containers:
      - name: django
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
        ports:
        - containerPort: 8000
        envFrom:
        - secretRef:
            name: django-secret
        - configMapRef:
            name: django-config
        volumeMounts:
        - name: static-storage
          mountPath: /app/staticfiles
        readinessProbe:
          httpGet:
            path: /
            port: 8000
          initialDelaySeconds: 20
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 15
      volumes:
      - name: static-storage
        persistentVolumeClaim:
          claimName: static-pvc